# Site settings
title: "Lorena A. Barba"
description: "Resume based on template for Jekyll and GitHub Pages sites."

# Build settings
markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

# Resume settings
resume_avatar:                  "false"
resume_name:                    "Lorena A. Barba"
resume_title:                   "Professor of Mechanical and Aerospace Engineering"

# used for the contact button in _layouts/resume.html
resume_contact_email:           "labarba@gwu.edu"

# the next two items are used for schema itemprops in _layouts/resume.html
resume_contact_telephone:       "202-994-6749"
resume_contact_address:         "800 22nd Street NW"

resume_header_contact_info:     "800 22nd Street NW, 3000 Science & Engineering Hall • 202-994-6749 • labarba@gwu.edu"
display_header_contact_info:    "false"

resume_header_intro: "<p>Engineering professor, computational scientist, open science pioneer, faculty director of the GW Open Source Program Office, Jupyter Distinguised Contributor.</p>"

# use "yes" to display the email contact button,
# "no" to display an "I'm not looking for work" message,
# or remove the resume_looking_for_work option entirely
# to leave blank
resume_looking_for_work:        "yes"

# Decide which sections to use
# comment out to hide
resume_section_experience:      true
resume_section_education:       true
resume_section_projects:        true
resume_section_skills:          false
resume_section_recognition:     true
resume_section_links:           true
resume_section_associations:    true
# resume_section_interests:       true

# Resume social links
# uncomment the options you wish to display, and add your own URL
resume_social_links:
resume_github_url:            "https://github.com/labarba"
resume_twitter_url:           "https://x.com/LorenaABarba"
#resume_dribbble_url:          "https://dribbble.com/jag"
# resume_facebook_url:          "insert Facebook URL here"
resume_linkedin_url:          "https://www.linkedin.com/in/lorenabarba/"
# resume_instagram_url:         "insert your Instagram URL here"
resume_website_url:           "http://lorenabarba.com"
resume_medium_url:            "https://medium.com/@lorenaabarba"
resume_print_social_links:      true

# Design settings
resume_theme:                   default

# Note: when editing locally, remember to restart
# your Jekyll server when you edit this file. Changes
# to _config.yml are only recognized when the server starts
