  resume_linkedin_url:          "https://www.linkedin.com/in/mine-d-a97834151/"
  # resume_instagram_url:         "insert your Instagram URL here"
  resume_website_url:           "https://www.dmmm.poliba.it/vr3lab/about-us/our-team/mine-dastan/"

