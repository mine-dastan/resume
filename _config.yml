# Site settings
title: "PhD Mine Dastan"
description: "Resume"

# Build settings
markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

# Resume settings
resume_avatar:                  "false"
resume_name:                    "Mine Dastan"
resume_title:                   "PhD of Engineering, Industry 4.0"

# used for the contact button in _layouts/resume.html
